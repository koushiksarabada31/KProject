<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Outcomes — KL University</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrapper">
      <header class="top-header" id="top-header"></header>
      <main class="main-content"><div class="space-y-6" id="page-content"></div></main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    initDashboardPage();
    let activeIdx = 0, showMapping = true;

    function render() {
      const active = courseOutcomesData[activeIdx];

      const tabs = courseOutcomesData.map((s,i) =>
        `<button class="tab-btn ${i===activeIdx?'active':''}" onclick="switchTab(${i})">${s.shortName}</button>`
      ).join('');

      const rows = active.outcomes.map((co,i) => `
        <tr class="animate-slide-in-left delay-${(i%5)+1}">
          <td style="font-weight:700;color:var(--primary)">${co.co}</td>
          <td style="line-height:1.6">${co.description}</td>
          <td class="text-muted">${co.po}</td>
          <td class="center"><span class="font-bold">${co.btl}</span><br><span class="text-xs text-muted">${btlLabels[co.btl]}</span></td>
        </tr>
      `).join('');

      const mappings = showMapping ? active.outcomes.map((co,i) => `
        <div style="padding:1rem 1.5rem" class="animate-fade-in-up delay-${(i%5)+1}">
          <div class="flex items-start" style="gap:0.75rem;margin-bottom:0.75rem">
            <span style="padding:0.25rem 0.5rem;border-radius:0.375rem;background:var(--primary);color:var(--primary-foreground);font-size:0.75rem;font-weight:700;flex-shrink:0">${co.co}</span>
            <p class="text-sm" style="line-height:1.5">${co.description.length > 120 ? co.description.slice(0,120)+'...' : co.description}</p>
          </div>
          <div class="ml-9 space-y-2">
            ${co.mappings.map(m => `
              <div class="flex items-start text-sm" style="gap:0.5rem">
                <span style="flex-shrink:0;margin-top:2px">${m.icon}</span>
                <span><span class="font-semibold">${m.feature}: </span><span class="text-muted">${m.details}</span></span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('') : '';

      const btlLegend = Object.entries(btlLabels).map(([l,label]) =>
        `<span style="padding:0.375rem 0.75rem;border-radius:0.5rem;background:var(--muted);font-size:0.75rem;color:var(--muted-foreground)"><span class="font-bold" style="color:var(--foreground);margin-right:0.25rem">${l}</span> — ${label}</span>`
      ).join('');

      document.getElementById('page-content').innerHTML = `
        <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:0.75rem">
          <div>
            <h1 class="text-2xl font-display font-bold flex items-center" style="gap:0.5rem"><span style="color:var(--primary)">${icons.target}</span> Course Outcomes</h1>
            <p class="text-sm text-muted">${active.subject} · Course Outcome Mapping</p>
          </div>
          <button class="btn btn-outline" onclick="downloadPDF()">📥 Download PDF</button>
        </div>
        <div class="tabs">${tabs}</div>
        <div class="card animate-fade-in"><div class="overflow-x-auto">
          <table class="data-table">
            <thead class="co-table-header"><tr><th style="width:4rem">CO NO</th><th>Course Outcome (CO)</th><th style="width:11rem">PO/PSO</th><th class="center" style="width:5rem">BTL</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div></div>
        <div class="card animate-fade-in-up delay-3">
          <button class="co-mapping-toggle" onclick="toggleMapping()">
            <h3 class="font-display font-semibold text-sm flex items-center" style="gap:0.5rem">📍 CO Mapping — Where Each Outcome Is Implemented</h3>
            <span class="text-xs text-muted">${showMapping?'Hide ▲':'Show ▼'}</span>
          </button>
          ${showMapping ? `<div class="divide-y">${mappings}</div>` : ''}
        </div>
        <div class="card animate-fade-in-up delay-4"><div class="card-body">
          <h3 class="font-display font-semibold text-sm mb-3">Bloom's Taxonomy Levels (BTL)</h3>
          <div class="flex flex-wrap" style="gap:0.75rem">${btlLegend}</div>
        </div></div>
      `;
    }

    window.switchTab = i => { activeIdx = i; render(); };
    window.toggleMapping = () => { showMapping = !showMapping; render(); };
    window.downloadPDF = () => { window.print(); };

    render();
  </script>
</body>
</html>
