<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes & Materials — KL University</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrapper">
      <header class="top-header" id="top-header"></header>
      <main class="main-content"><div class="space-y-6" id="page-content"></div></main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    initDashboardPage();
    const typeClasses = { PDF:'type-pdf', PPT:'type-ppt', Video:'type-video', Notes:'type-notes', eBook:'type-ebook' };
    const typeEmojis = { PDF:'📄', PPT:'📊', Video:'🎬', Notes:'📝', eBook:'📚' };

    function render(search='') {
      const filtered = notes.filter(n => n.title.toLowerCase().includes(search) || n.subject.toLowerCase().includes(search));
      const cards = filtered.map((n,i) => `
        <div class="card animate-scale-in delay-${(i%5)+1}" style="transition:box-shadow 0.2s">
          <div class="card-body">
            <div class="flex items-start" style="gap:1rem">
              <div class="type-icon ${typeClasses[n.type]||'type-pdf'}" style="font-size:1.25rem;display:flex;align-items:center;justify-content:center;width:3rem;height:3rem">${typeEmojis[n.type]||'📄'}</div>
              <div class="flex-1" style="min-width:0">
                <h3 class="font-semibold text-sm truncate">${n.title}</h3>
                <p class="text-xs text-muted mt-1">${n.subject}</p>
                <div class="flex items-center text-xs text-muted mt-2" style="gap:0.75rem">
                  <span>${n.size}</span><span>•</span><span>${n.downloads} downloads</span>
                </div>
              </div>
            </div>
            <a href="${n.downloadFile}" download class="btn btn-outline btn-sm btn-full mt-4" onclick="downloadNote('${n.title}')">📥 Download</a>
          </div>
        </div>
      `).join('');

      document.getElementById('page-content').innerHTML = `
        <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:1rem">
          <div><h1 class="text-2xl font-display font-bold">Notes & Materials</h1><p class="text-sm text-muted">Study resources organized by subject</p></div>
          <div style="position:relative;width:18rem">
            <span style="position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--muted-foreground)">🔍</span>
            <input class="input input-search" id="search-input" placeholder="Search materials..." value="${search}">
          </div>
        </div>
        <div class="grid grid-3 gap-4">${cards || '<p class="text-muted" style="grid-column:1/-1;text-align:center;padding:2rem">No materials found</p>'}</div>
      `;
      document.getElementById('search-input').addEventListener('input', e => render(e.target.value.toLowerCase()));
    }

    window.downloadNote = function(title) {
      showToast('Download Started', `${title} is downloading`);
      // Increment download count in display
      const el = event.target.closest('.card');
      if (el) {
        const countSpan = el.querySelectorAll('.text-xs.text-muted span');
        if (countSpan.length >= 3) {
          const current = parseInt(countSpan[2].textContent);
          countSpan[2].textContent = (current + 1) + ' downloads';
        }
      }
    };

    render();
  </script>
</body>
</html>
