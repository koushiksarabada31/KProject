<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marks & Results — KL University</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="main-wrapper">
      <header class="top-header" id="top-header"></header>
      <main class="main-content"><div class="space-y-6" id="page-content"></div></main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    initDashboardPage();
    let semester = '4';
    const gradeColors = { 'A+': 'hsl(152,60%,40%)', 'A': 'hsl(152,50%,50%)', 'B+': 'hsl(38,92%,50%)', 'B': 'hsl(38,80%,60%)', 'C': 'hsl(0,72%,50%)' };
    const COLORS = ['hsl(0,72%,45%)','hsl(35,95%,55%)','hsl(152,60%,40%)','hsl(210,80%,52%)','hsl(280,60%,50%)','hsl(180,60%,40%)'];

    function render() {
      const marks = semesterMarksData[semester] || [];
      const totalGPA = marks.length > 0 ? (marks.reduce((s,m) => s + m.gpa * m.credits, 0) / marks.reduce((s,m) => s + m.credits, 0)).toFixed(2) : '0.00';
      const totalCredits = marks.reduce((s,m) => s + m.credits, 0);

      let rows = marks.map((m,i) => `
        <tr class="animate-slide-in-left delay-${i+1}">
          <td style="font-weight:500">${m.subject}</td>
          <td class="center mono">${m.code}</td>
          <td class="center">${m.internal}/30</td>
          <td class="center">${m.external}/70</td>
          <td class="center" style="font-weight:600">${m.total}/100</td>
          <td class="center"><span class="badge" style="background:${gradeColors[m.grade]}20;color:${gradeColors[m.grade]}">${m.grade}</span></td>
          <td class="center">${m.credits}</td>
        </tr>
      `).join('');
      if (!marks.length) rows = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted-foreground)">No marks available</td></tr>';

      document.getElementById('page-content').innerHTML = `
        <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:1rem">
          <div><h1 class="text-2xl font-display font-bold">Marks & Results</h1><p class="text-sm text-muted">Semester-wise academic performance</p></div>
          <select class="select" style="width:12rem" id="sem-select">
            ${[1,2,3,4].map(s => `<option value="${s}" ${s==semester?'selected':''}>Semester ${s}</option>`).join('')}
          </select>
        </div>
        <div class="card animate-fade-in"><div class="overflow-x-auto">
          <table class="data-table">
            <thead><tr><th>Subject</th><th class="center">Code</th><th class="center">Internal</th><th class="center">External</th><th class="center">Total</th><th class="center">Grade</th><th class="center">Credits</th></tr></thead>
            <tbody>${rows}</tbody>
            ${marks.length ? `<tfoot><tr><td colspan="5" style="font-weight:600">Semester GPA</td><td class="center" style="font-weight:700;color:var(--primary);font-size:1.125rem">${totalGPA}</td><td class="center" style="font-weight:600">${totalCredits}</td></tr></tfoot>` : ''}
          </table>
        </div></div>
        ${marks.length ? `
        <div class="grid grid-2 gap-6">
          <div class="card animate-fade-in-up delay-3"><div class="card-body"><h3 class="font-display font-semibold mb-4">Subject-wise Marks</h3><div class="chart-container" style="height:250px"><canvas id="barChart"></canvas></div></div></div>
          <div class="card animate-fade-in-up delay-4"><div class="card-body"><h3 class="font-display font-semibold mb-4">GPA Trend</h3><div class="chart-container" style="height:250px"><canvas id="lineChart"></canvas></div></div></div>
          <div class="card animate-fade-in-up delay-5"><div class="card-body"><h3 class="font-display font-semibold mb-4">Grade Distribution</h3><div class="chart-container" style="height:250px"><canvas id="pieChart"></canvas></div></div></div>
          <div class="card animate-fade-in-up delay-6"><div class="card-body"><h3 class="font-display font-semibold mb-4">Subject Performance Radar</h3><div class="chart-container" style="height:250px"><canvas id="radarChart"></canvas></div></div></div>
        </div>` : ''}
      `;

      document.getElementById('sem-select').addEventListener('change', e => { semester = e.target.value; render(); });

      if (!marks.length) return;

      // Bar Chart
      new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: { labels: marks.map(m=>m.code), datasets: [{ label: 'Total', data: marks.map(m=>m.total), backgroundColor: marks.map((_,i)=>COLORS[i%COLORS.length]), borderRadius: 6 }] },
        options: { responsive:true, maintainAspectRatio:false, scales:{ y:{min:0,max:100} }, plugins:{legend:{display:false}} }
      });
      // Line Chart
      new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: { labels: gpaTrend.map(g=>g.semester), datasets: [{ label:'GPA', data:gpaTrend.map(g=>g.gpa), borderColor:'hsl(0,72%,45%)', borderWidth:3, tension:0.3, pointRadius:5, pointBackgroundColor:'hsl(0,72%,45%)', fill:false }] },
        options: { responsive:true, maintainAspectRatio:false, scales:{ y:{min:7,max:10} }, plugins:{legend:{display:false}} }
      });
      // Pie Chart
      const gradeDist = {};
      marks.forEach(m => { gradeDist[m.grade] = (gradeDist[m.grade]||0) + 1; });
      new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: { labels: Object.keys(gradeDist), datasets: [{ data: Object.values(gradeDist), backgroundColor: Object.keys(gradeDist).map(g => gradeColors[g] || '#888') }] },
        options: { responsive:true, maintainAspectRatio:false }
      });
      // Radar Chart
      new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: { labels: marks.map(m=>m.code), datasets: [{ label:'Score', data:marks.map(m=>m.total), borderColor:'hsl(0,72%,45%)', backgroundColor:'hsl(0,72%,45%,0.2)', borderWidth:2 }] },
        options: { responsive:true, maintainAspectRatio:false, scales:{ r:{min:0,max:100} } }
      });
    }
    render();
  </script>
</body>
</html>
